<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMC Login</title>
    <style>
        body {
            background: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            text-align: center;
        }

        .patch {
            width: 160px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.6));
        }

        .login-box {
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            border: 1px solid #C2B59B;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #C2B59B;
            letter-spacing: 1px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #C2B59B;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: #111;
            margin-top: 10px;
        }

        button:hover {
            background: #a89f8a;
        }

        .error {
            color: #ff4d4d;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="login-container">

    <!-- Your patch -->
    <img src="patch.png" class="patch">

    <div class="login-box">
        <h2>EMC Login</h2>

        <input id="username" type="text" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <p id="error" class="error"></p>
    </div>
</div>

<script>
function login() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    if (user === "emc" && pass === "emc") {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "index.html";
    } else {
        document.getElementById("error").textContent = "Invalid username or password.";
    }
}
</script>

</body>
</html>
