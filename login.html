<!DOCTYPE html>
<html>
<head>
  <title>Eternals MC Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
  <div class="login-box">
    <h1>ETERNALS MC</h1>
    <p>Members Only</p>

    <!-- Supabase Discord login button -->
    <button class="login-btn" onclick="login()">Login with Discord</button>

  </div>

  <!-- Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const sb = supabase.createClient(
      "https://gleavemxohcagjrsgnu.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZWF2ZW14b2hjYWdqc..."
    );

    async function login() {
      const { data, error } = await sb.auth.signInWithOAuth({
        provider: "discord"
      });

      if (error) {
        console.error(error);
      }
    }
  </script>
</body>
</html>
