<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eternals MC | Zephyr Dashboard</title>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            align-items: center;
            background: #111;
            padding: 15px 25px;
            border-bottom: 2px solid #b8860b;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-logo img {
            height: 60px;
        }

        .nav-title {
            font-size: 22px;
            font-weight: bold;
            color: #b8860b;
        }

        .nav-subtitle {
            font-size: 14px;
            color: #ccc;
        }

        .nav-links {
            margin-left: auto;
            display: flex;
            gap: 25px;
        }

        .nav-links div {
            font-size: 16px;
            cursor: pointer;
            color: #aaa;
        }

        .nav-links .active {
            color: #b8860b;
            font-weight: bold;
        }

        /* MAIN CONTENT */
        .container {
            padding: 25px;
        }

        .section-title {
            font-size: 22px;
            margin-bottom: 10px;
            color: #b8860b;
        }

        /* FUNDS OVERVIEW */
        .funds-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 25px;
        }

        .funds-grid {
            display: flex;
            gap: 20px;
        }

        .fund-item {
            flex: 1;
            background: #111;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .fund-item h3 {
            margin: 0 0 5px;
            color: #b8860b;
        }

        .fund-value {
            font-size: 26px;
            font-weight: bold;
        }

        .clean { color: #4caf50; }
        .dirty { color: #f44336; }

        #addTransactionBtn {
            margin-top: 15px;
            background: #b8860b;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
        }

        #addTransactionBtn:hover {
            background: #d4a017;
        }

        /* STATUS SNAPSHOT */
        .status-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 25px;
        }

        /* TRANSACTION LOG */
        .log-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #333;
            text-align: left;
        }

        th {
            color: #b8860b;
        }

        /* MODAL */
        #transactionModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            padding: 20px;
            width: 350px;
            border-radius: 8px;
            border: 1px solid #b8860b;
        }

        .modal-content h2 {
            margin-top: 0;
            color: #b8860b;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border-radius: 6px;
            border: none;
            background: #222;
            color: white;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            background: #b8860b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .modal-content button:hover {
            background: #d4a017;
        }

        #closeModal {
            background: #444;
            margin-top: 10px;
        }

        #closeModal:hover {
            background: #666;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-logo">
        <img src="logo.png" alt="Eternals MC Logo" />
        <div>
            <div class="nav-title">ETERNALS MC</div>
            <div class="nav-subtitle">ZEPHYR CHARTER</div>
        </div>
    </div>

    <div class="nav-links">
        <div class="active">Dashboard</div>
        <div>Members</div>
        <div>Operations</div>
        <div>Finance</div>
    </div>
</div>

<div class="container">

    <!-- FUNDS OVERVIEW -->
    <div class="funds-box">
        <div class="section-title">Funds Overview – Club Balances</div>

        <div class="funds-grid">
            <div class="fund-item">
                <h3>Total Funds</h3>
                <div class="fund-value" id="totalFunds">$0</div>
            </div>

            <div class="fund-item">
                <h3>Clean Money</h3>
                <div class="fund-value clean" id="cleanBalance">$0</div>
            </div>

            <div class="fund-item">
                <h3>Dirty Money</h3>
                <div class="fund-value dirty" id="dirtyBalance">$0</div>
            </div>
        </div>

        <button id="addTransactionBtn">ADD TRANSACTION</button>
    </div>

    <!-- STATUS SNAPSHOT -->
    <div class="status-box">
        <div class="section-title">Status Snapshot</div>
        <div id="statusMessage">No transactions yet</div>
    </div>

    <!-- TRANSACTION LOG -->
    <div class="log-box">
        <div class="section-title">Transaction Log – Income & Expenses</div>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Logged By</th>
                    <th>Type</th>
                    <th>Money</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Balance After</th>
                </tr>
            </thead>
            <tbody id="transactionLog"></tbody>
        </table>
    </div>

</div>

<!-- MODAL -->
<div id="transactionModal">
    <div class="modal-content">
        <h2>Add Transaction</h2>

        <label>Type</label>
        <select id="transactionType">
            <option value="income">Income (Clean)</option>
            <option value="expense">Expense (Clean)</option>
            <option value="dirty_income">Income (Dirty)</option>
            <option value="dirty_expense">Expense (Dirty)</option>
        </select>

        <label>Amount</label>
        <input type="number" id="transactionAmount" placeholder="Enter amount" />

        <label>Description</label>
        <input type="text" id="transactionTag" placeholder="e.g. Gun Sale, Club Dues" />

        <button id="saveTransaction">Save Transaction</button>
        <button id="closeModal">Cancel</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
