<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eternals MC | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="patch.png" class="sidebar-patch" alt="Eternals MC Patch">
            <h1>ETERNALS MC</h1>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item active">Dashboard</button>
            <button class="nav-item">Club Funds</button>
            <button class="nav-item">Members</button>
            <button class="nav-item">Transactions</button>
        </nav>

        <div class="sidebar-footer">
            <div class="user-box">
                <span class="user-name">Sahil</span>
                <span class="user-role">ADMIN</span>
            </div>
            <button class="logout-btn">Logout</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <!-- TOP STATS BAR -->
        <section class="stats-bar">
            <div class="stat-card">
                <label>Total Money</label>
                <span id="totalMoney">$0</span>
            </div>

            <div class="stat-card">
                <label>Total Deals</label>
                <span id="totalDeals">0</span>
            </div>

            <div class="stat-card">
                <label>Active Members</label>
                <span id="activeMembers">0</span>
            </div>
        </section>

        <!-- FUNDS SECTION -->
        <section class="card">
            <div class="card-title">Club Funds</div>

            <div class="funds">
                <p>Clean: $<span id="cleanBalance">0</span></p>
                <p>Dirty: $<span id="dirtyBalance">0</span></p>
            </div>

            <div class="input-group">
                <input id="cleanInput" type="number" placeholder="New Clean Amount">
                <input id="dirtyInput" type="number" placeholder="New Dirty Amount">
                <button id="updateFundsBtn">Update Funds</button>
            </div>
        </section>

        <!-- MEMBERS SECTION -->
        <section class="card">
            <div class="card-title">Members</div>

            <div id="membersList" class="list"></div>

            <div class="input-group">
                <input id="memberName" type="text" placeholder="Member Name">
                <input id="memberRole" type="text" placeholder="Member Role">
                <button id="updateMembersBtn">Add / Update Member</button>
            </div>
        </section>

        <!-- TRANSACTIONS SECTION -->
        <section class="card">
            <div class="card-title">Transactions</div>

            <div id="transactionsList" class="list"></div>

            <div class="input-group">
                <input id="txDescription" type="text" placeholder="Description">
                <input id="txAmount" type="number" placeholder="Amount">

                <select id="txType">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>

                <button id="addTxBtn">Add Transaction</button>
            </div>
        </section>

    </main>

    <script src="script.v2.js"></script>
</body>
</html>
