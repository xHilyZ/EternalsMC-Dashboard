<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eternals MC | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="patch.png" class="sidebar-patch" alt="Eternals MC Patch">
            <h1>ETERNALS MC</h1>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item" onclick="showPage('dashboard')"><span class="icon">🏠</span> Dashboard</button>
            <button class="nav-item" onclick="showPage('deals')"><span class="icon">📄</span> Deals</button>
            <button class="nav-item" onclick="showPage('bank')"><span class="icon">💵</span> Bank</button>
            <button class="nav-item" onclick="showPage('checklist')"><span class="icon">✔️</span> Checklist</button>
            <button class="nav-item" onclick="showPage('prices')"><span class="icon">🔫</span> Price List</button>
            <button class="nav-item" onclick="showPage('members')"><span class="icon">👥</span> Members</button>
            <button class="nav-item" onclick="showPage('transactions')"><span class="icon">📑</span> Transactions</button>
        </nav>

        <div class="sidebar-footer">
            <div class="user-box">
                <span class="user-name">Sahil</span>
                <span class="user-role">ADMIN</span>
            </div>
            <button class="logout-btn">Logout</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <!-- TOP BAR -->
        <div class="top-bar">
            Welcome, Sahil — Eternals MC Admin
        </div>

        <!-- DASHBOARD PAGE -->
        <section id="dashboard" class="page active">

            <!-- TOP STATS -->
            <section class="top-stats">
                <div class="money-main">
                    <label>Total Money</label>
                    <span id="totalMoney">$0</span>
                </div>

                <div class="sub-stats">
                    <div class="sub-stat">
                        <label>Total Deals</label>
                        <span id="totalDeals">0</span>
                    </div>
                    <div class="sub-stat">
                        <label>Active Members</label>
                        <span id="activeMembers">0</span>
                    </div>
                </div>
            </section>

            <!-- QUICK ACTION TILES -->
            <section class="quick-actions">
                <div class="action-tile" onclick="showPage('deals')">
                    <div class="action-icon">📄</div>
                    <div class="action-label">Add Deals</div>
                </div>

                <div class="action-tile" onclick="showPage('bank')">
                    <div class="action-icon">💵</div>
                    <div class="action-label">Bank</div>
                </div>

                <div class="action-tile" onclick="showPage('checklist')">
                    <div class="action-icon">✔️</div>
                    <div class="action-label">Checklist</div>
                </div>

                <div class="action-tile" onclick="showPage('prices')">
                    <div class="action-icon">🔫</div>
                    <div class="action-label">Price List</div>
                </div>
            </section>

            <!-- OVERVIEW CARDS -->
            <section class="card">
                <div class="card-title">Club Funds</div>
                <div class="funds">
                    <p>Clean: $<span id="cleanBalance">0</span></p>
                    <p>Dirty: $<span id="dirtyBalance">0</span></p>
                </div>
            </section>

            <section class="card">
                <div class="card-title">Members</div>
                <div id="membersList" class="list"></div>
            </section>

            <section class="card">
                <div class="card-title">Transactions</div>
                <div id="transactionsList" class="list"></div>
            </section>

        </section>

        <!-- OTHER PAGES (unchanged structure) -->
        <section id="deals" class="page"><div class="page-title">Deals</div><div id="dealsList" class="list"></div></section>
        <section id="bank" class="page"><div class="page-title">Bank</div></section>
        <section id="checklist" class="page"><div class="page-title">Checklist</div></section>
        <section id="prices" class="page"><div class="page-title">Price List</div></section>
        <section id="members" class="page"><div class="page-title">Members</div></section>
        <section id="transactions" class="page"><div class="page-title">Transactions</div></section>

    </main>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>

</body>
</html>
