<!DOCTYPE html>
<html>
<head>
  <title>Eternals MC Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>ETERNALS MC</h2>

    <!-- PATCH LOGO -->
    <img src="/patch.png" class="sidebar-patch" alt="Eternals MC Patch">

    <ul>
      <li>Dashboard</li>
      <li class="restricted">Deals</li>
      <li class="restricted">Bank</li>
      <li class="restricted">Checklist</li>
      <li class="restricted">Price List</li>
      <li class="restricted">Members</li>
      <li class="restricted">Transactions</li>
    </ul>

    <div id="user-box"></div>
  </aside>

  <!-- MAIN CONTENT -->
  <main>

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <h1>Welcome — Eternals MC</h1>

      <section class="stats">
        <div class="stat-box">
          <h3>Total Money</h3>
          <p id="totalMoney">$0</p>
        </div>

        <div class="stat-box">
          <h3>Total Deals</h3>
          <p id="totalDeals">0</p>
        </div>

        <div class="stat-box">
          <h3>Active Members</h3>
          <p id="activeMembers">0</p>
        </div>
      </section>

      <!-- CHECKLIST TILE (restricted) -->
      <div class="quick-actions restricted">
        <div class="action-tile" onclick="openChecklist()">
          <span class="action-icon">📋</span>
          <span class="action-label">Checklist</span>
        </div>
      </div>
    </div>

    <!-- DEALS -->
    <div id="page-deals" class="page restricted">
      <h2>Deals</h2>

      <input id="txDescription" type="text" placeholder="Description">
      <input id="txAmount" type="number" placeholder="Amount">

      <select id="txType">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>

      <button id="addTxBtn">Add Transaction</button>

      <div id="transactionsList"></div>
    </div>

    <!-- BANK -->
    <div id="page-bank" class="page restricted">
      <h2>Club Funds</h2>

      <p>Clean: $<span id="cleanBalance">0</span></p>
      <input id="cleanInput" type="number" placeholder="Add/Remove Clean (+/-)">

      <p>Dirty: $<span id="dirtyBalance">0</span></p>
      <input id="dirtyInput" type="number" placeholder="Add/Remove Dirty (+/-)">

      <button id="updateFundsBtn">Update Funds</button>
    </div>

    <!-- MEMBERS -->
    <div id="page-members" class="page restricted">
      <h2>Members</h2>

      <input id="memberName" type="text" placeholder="Member Name">
      <input id="memberRank" type="text" placeholder="Rank">

      <button id="updateMembersBtn">Add Member</button>

      <div id="membersList"></div>
    </div>

    <!-- TRANSACTIONS -->
    <div id="page-transactions" class="page restricted">
      <h2>Transactions</h2>
      <div id="transactionsList2"></div>
    </div>

    <!-- CHECKLIST PAGE -->
    <div id="page-checklist" class="page restricted">
      <h2>Daily Checklist</h2>

      <div id="checklistHeader" style="margin-bottom: 15px; color:#C2B59B; font-size: 18px;"></div>

      <div id="checklistContainer"></div>
    </div>

    <!-- ⭐ PRICE LIST PAGE (NEW) -->
    <div id="page-pricelist" class="page restricted">
      <h2>Price List</h2>
      <div id="priceListContainer"></div>
    </div>

  </main>

  <!-- EDIT MEMBER MODAL -->
  <div id="editModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Edit Member</h3>

      <label>Name:</label>
      <input id="editName" type="text">

      <label>Rank:</label>
      <input id="editRank" type="text">

      <button id="saveEditBtn">Save</button>
      <button id="cancelEditBtn">Cancel</button>
    </div>
  </div>

  <!-- PAGE SWITCHING -->
  <script>
    const pages = {
      "Dashboard": "page-dashboard",
      "Deals": "page-deals",
      "Bank": "page-bank",
      "Checklist": "page-checklist",
      "Price List": "page-pricelist",
      "Members": "page-members",
      "Transactions": "page-transactions"
    };

    document.querySelectorAll(".sidebar ul li").forEach(item => {
      item.addEventListener("click", () => {
        const pageId = pages[item.innerText];
        if (!pageId) return;

        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(pageId).classList.add("active");
      });
    });
  </script>

  <!-- MAIN SCRIPT -->
  <script src="/script.v2.js"></script>

  <!-- SUPABASE AUTH -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const sb = supabase.createClient(
      "https://glgeavemxohcagjrsqnu.supabase.co",
      "sb_publishable_qQquFMH_seITOJyy581rxw_Rp0Vqafo"
    );

    async function checkAuth() {
      const { data, error } = await sb.auth.getSession();
      const userBox = document.getElementById("user-box");

      if (error || !data) return;

      if (!data.session) {
        document.body.classList.add("guest");
        userBox.innerHTML = `<button class="login-btn" onclick="login()">Login with Discord</button>`;
      } else {
        document.body.classList.remove("guest");
        userBox.innerHTML = `MEMBER<br><button onclick="logout()">Logout</button>`;
      }
    }

    async function login() {
      await sb.auth.signInWithOAuth({
        provider: "discord",
        options: {
          redirectTo: "https://eternals-mc-dashboard.vercel.app/index.html"
        }
      });
    }

    async function logout() {
      await sb.auth.signOut();
      window.location.reload();
    }

    checkAuth();
    setTimeout(checkAuth, 500);
  </script>

</body>
</html>
