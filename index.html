<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eternals MC | Dashboard</title>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: Arial, sans-serif;
            color: white;
        }

        header {
            background: #111;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #b8860b;
        }

        header img {
            height: 80px;
        }

        h1 {
            margin: 10px 0 0;
            font-size: 28px;
            color: #b8860b;
        }

        .container {
            padding: 20px;
        }

        .balances {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .balance-box {
            flex: 1;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .balance-box h2 {
            margin: 0 0 10px;
            color: #b8860b;
        }

        .balance-value {
            font-size: 26px;
            font-weight: bold;
        }

        #addTransactionBtn {
            background: #b8860b;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        #addTransactionBtn:hover {
            background: #d4a017;
        }

        .log-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }

        .t-type.income { color: #4caf50; }
        .t-type.expense { color: #f44336; }

        /* Modal */
        #transactionModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            padding: 20px;
            width: 350px;
            border-radius: 8px;
            border: 1px solid #b8860b;
        }

        .modal-content h2 {
            margin-top: 0;
            color: #b8860b;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border-radius: 6px;
            border: none;
            background: #222;
            color: white;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            background: #b8860b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .modal-content button:hover {
            background: #d4a017;
        }

        #closeModal {
            background: #444;
            margin-top: 10px;
        }

        #closeModal:hover {
            background: #666;
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="Eternals MC Logo" />
    <h1>Eternals MC | Club Dashboard</h1>
</header>

<div class="container">

    <div class="balances">
        <div class="balance-box">
            <h2>Clean Balance</h2>
            <div class="balance-value" id="cleanBalance">$0</div>
        </div>

        <div class="balance-box">
            <h2>Dirty Balance</h2>
            <div class="balance-value" id="dirtyBalance">$0</div>
        </div>
    </div>

    <button id="addTransactionBtn">Add Transaction</button>

    <div class="log-box">
        <h2>Transaction Log</h2>
        <div id="transactionLog"></div>
    </div>

</div>

<!-- Modal -->
<div id="transactionModal">
    <div class="modal-content">
        <h2>Add Transaction</h2>

        <label>Type</label>
        <select id="transactionType">
            <option value="income">Income (Clean)</option>
            <option value="expense">Expense (Clean)</option>
            <option value="dirty_income">Income (Dirty)</option>
            <option value="dirty_expense">Expense (Dirty)</option>
        </select>

        <label>Amount</label>
        <input type="number" id="transactionAmount" placeholder="Enter amount" />

        <label>Tag / Description</label>
        <input type="text" id="transactionTag" placeholder="e.g. Gun Sale, Club Dues" />

        <button id="saveTransaction">Save Transaction</button>
        <button id="closeModal">Cancel</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
