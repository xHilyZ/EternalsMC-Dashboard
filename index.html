<!DOCTYPE html>
<html>
<head>
  <title>Eternals MC Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>ETERNALS MC</h2>
    <ul>
      <li>Dashboard</li>
      <li class="restricted">Deals</li>
      <li class="restricted">Bank</li>
      <li class="restricted">Checklist</li>
      <li class="restricted">Price List</li>
      <li class="restricted">Members</li>
      <li class="restricted">Transactions</li>
    </ul>

    <!-- USER BOX (Login or Member/Logout) -->
    <div id="user-box"></div>
  </aside>

  <!-- MAIN CONTENT -->
  <main>

    <h1>Welcome — Eternals MC</h1>

    <!-- ALWAYS VISIBLE -->
    <section class="stats">
      <div class="stat-box">
        <h3>Total Money</h3>
        <p id="totalMoney">$0</p>
      </div>

      <div class="stat-box">
        <h3>Total Deals</h3>
        <p id="totalDeals">0</p>
      </div>

      <div class="stat-box">
        <h3>Active Members</h3>
        <p id="activeMembers">0</p>
      </div>
    </section>

    <!-- RESTRICTED BUTTONS -->
    <section class="restricted actions">
      <button>Add Deals</button>
      <button>Bank</button>
      <button>Checklist</button>
      <button>Price List</button>
    </section>

    <!-- RESTRICTED SECTIONS -->
    <section class="restricted">
      <h2>Club Funds</h2>
      <p>Clean: $0</p>
      <p>Dirty: $0</p>
    </section>

    <section class="restricted">
      <h2>Members</h2>
      <div id="membersList"></div>
    </section>

    <section class="restricted">
      <h2>Transactions</h2>
      <div id="transactionsList"></div>
    </section>

  </main>

  <!-- SUPABASE AUTH -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const sb = supabase.createClient(
      "https://glgeavemxohcagjrsqnu.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZ2VhdmVteG9oY2FnanJzcW51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTk3MDksImV4cCI6MjA4ODI3NTcwOX0.AJERdGpD08N8gRsM0x-cNXD151ZtRlj08GUwuUdg3tk"
    );

    async function checkAuth() {
      const { data } = await sb.auth.getSession();

      const userBox = document.getElementById("user-box");

      if (!data.session) {
        // NOT LOGGED IN
        document.body.classList.add("guest");

        userBox.innerHTML = `
          <button class="login-btn" onclick="login()">Login with Discord</button>
        `;
      } else {
        // LOGGED IN
        document.body.classList.remove("guest");

        userBox.innerHTML = `
          MEMBER<br>
          <button onclick="logout()">Logout</button>
        `;
      }
    }

    async function login() {
      await sb.auth.signInWithOAuth({
        provider: "discord",
        options: {
          redirectTo: "https://eternals-mc-dashboard.vercel.app/index.html"
        }
      });
    }

    async function logout() {
      await sb.auth.signOut();
      window.location.reload();
    }

    checkAuth();
  </script>

</body>
</html>
